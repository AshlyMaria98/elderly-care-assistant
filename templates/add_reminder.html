<!DOCTYPE html>
<html>
<head>
    <title>Add Reminder</title>
    <style>
        body {
    font-family: 'Segoe UI', sans-serif;

    background: linear-gradient(135deg, #ffecd2, #fcb69f);
    display: flex;
    justify-content: center;
    align-items: center;
}
    .container {
    width: 650px;
}

.card {
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);

    background: rgba(255, 255, 255, 0.35);
    border-radius: 20px;
    padding: 22px;
    margin: 15px 0;

    border: 1px solid rgba(255, 255, 255, 0.5);
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);

    color: #1e3d4a;
    transition: 0.3s ease;
}
    .card:hover {
    transform: translateY(-4px);
}

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }
        h2 {
    text-align: center;
    color: #1e3d4a;
    margin-bottom: 25px;
    font-weight: 600;
    letter-spacing: 1px;
}

        a {
            display: block;
            margin-top: 15px;
            text-align: center;
        }
    .glass-btn {
    display: inline-block;
    padding: 10px 18px;
    border-radius: 12px;
    text-decoration: none;
    border: none;
    cursor: pointer;

    backdrop-filter: blur(10px);
    background: rgba(255, 255, 255, 0.4);
    color: #523737;

    border: 1px solid rgba(255, 255, 255, 0.6);
    transition: 0.3s;
    font-weight: 500;
}

.glass-btn:hover {
    background: rgba(255, 255, 255, 0.6);
}

    </style>
</head>
<body>
    <div class="container">
   <div class="card">
    <h2>Add Reminder</h2>

    <form method="POST">
       {% if session['role'] == 'guardian' %}
    <label>Select Elder:</label>
    <select name="elder_id" required>
        {% for elder in elders %}
            <option value="{{ elder['id'] }}">
                {{ elder['fullname'] }}
            </option>
        {% endfor %}
    </select>
{% endif %}


        Title:
        <input type="text" name="title" required>

        Type:
        <select name="type">
            <option value="Medicine">Medicine</option>
            <option value="Doctor">Doctor Appointment</option>
        </select>

        Date:
        <input type="date" name="date" required>

        Time:
        <input type="time" name="time" required>

        Notes:
        <textarea name="notes"></textarea>

        <button type="submit">Save Reminder</button>
    </form>

    {% if session['role'] == 'elder' %}
    <a href="{{ url_for('view_reminders') }}">
{% else %}
    <a href="{{ url_for('view_reminders') }}">
{% endif %}
    ← Back
</a>

</div>
</div>
</body>
</html>
