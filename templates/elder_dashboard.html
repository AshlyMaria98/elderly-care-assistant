{% extends "base.html" %}

{% block body_class %}dashboard-mode{% endblock %}

{% block content %}
<style>
    .dashboard-container {
        width: 90%;
        max-width: 1000px;
        margin: 40px auto;
    }

    .dashboard-heading {
        text-align: center;
        margin-bottom: 40px;
        color: #1e3d4a;
    }

    .dashboard-heading h2 {
        font-size: 2.2em;
        margin-bottom: 10px;
        font-weight: 700;
    }

    .dashboard-heading p {
        font-size: 1.1em;
        opacity: 0.8;
    }

    /* Grid Layout for Dashboard Cards */
    .dashboard {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 25px;
    }

    .card {
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        background: rgba(255, 255, 255, 0.35);
        border-radius: 20px;
        padding: 30px 20px;
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.5);
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
        color: #1e3d4a;
        transition: 0.3s ease;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }

    .card:hover {
        transform: translateY(-8px);
        background: rgba(255, 255, 255, 0.45);
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
    }

    .card h3 {
        margin-bottom: 20px;
        font-size: 1.3em;
        font-weight: 600;
    }

    .btn-small {
        padding: 10px 25px;
        background: #1e3d4a;
        color: white;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-weight: 500;
        transition: 0.3s;
        text-decoration: none;
        display: inline-block;
    }

    .btn-small:hover {
        background: #2c5a6d;
        transform: scale(1.05);
    }

    /* SOS Button Special Style */
    .sos-card {
        border: 1px solid rgba(255, 0, 0, 0.2);
    }
    
    .sos-btn {
        background: #c0392b;
    }
    
    .sos-btn:hover {
        background: #e74c3c;
    }
</style>

<div class="dashboard-container">
    <div class="dashboard-wrapper">

        <!-- Back to Login Button -->
        <div style="margin-bottom:15px;">
            <a href="{{ url_for('login') }}" 
               style="text-decoration:none;
               background:#eef6f6;
               padding:8px 14px;
               border-radius:8px;
               color:#4d7c7c;
               font-weight:500;">
               ← Back
            </a>
        </div>

        <div class="dashboard-heading">
            <h2>Welcome to Your Dashboard</h2>
            <p>Manage your health and safety with ease</p>
        </div>

        <div class="dashboard">

            <!-- BMI -->
            <div class="card">
                <h3>Check BMI</h3>
                <a href="{{ url_for('bmi') }}" class="btn-small">Go</a>
            </div>

            <!-- Medicine Reminder -->
            <div class="card">
                <h3>Medicine Reminder</h3>
                <a href="{{ url_for('view_reminders') }}">
                    <button class="btn-small">Go</button>
                </a>
            </div>

            <!-- Health Data Hub -->
            <div class="card">
                <h3>Health Data</h3>
                <a href="{{ url_for('health_hub') }}">
                    <button class="btn-small">Go</button>
                </a>
            </div>

            <!-- Mood Data Hub -->
            <div class="card">
                <h3>Mood Data</h3>
                <a href="{{ url_for('mood_options') }}">
                    <button class="btn-small">Go</button>
                </a>
            </div>

           <!-- SOS Emergency -->
           <div class="card">
                <h3>SOS Emergency</h3>
                <a href="{{ url_for('sos') }}">
                    <button class="btn-small">Go</button>
                 </a>
            </div>

        </div>

    </div>
</div>
{% endblock %}
