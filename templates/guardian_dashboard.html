{% extends "base.html" %}

{% block body_class %}dashboard-mode{% endblock %}

{% block content %}
<style>
    .dashboard-container {
        width: 90%;
        max-width: 1000px;
        margin: 40px auto;
    }

    .dashboard-heading {
        text-align: center;
        margin-bottom: 40px;
        color: #f8f9fa;
    }

    .dashboard-heading h2 {
        font-size: 2.2em;
        margin-bottom: 10px;
        font-weight: 700;
    }

    .dashboard-heading p {
        font-size: 1.1em;
        opacity: 0.8;
    }

    /* Grid Layout for Guardian Cards */
    .dashboard {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 25px;
    }

    .card {
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        background: white;
        border-radius: 20px;
        padding: 30px 20px;
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.5);
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
        color: #1e3d4a;
        transition: 0.3s ease;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }

    .card:hover {
        transform: translateY(-8px);
        background: rgba(255, 255, 255, 0.45);
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
    }

    .card h3 {
        margin-bottom: 20px;
        font-size: 1.3em;
        font-weight: 600;
    }

    .btn-small {
        padding: 10px 25px;
        background: #1e3d4a;
        color: white;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-weight: 500;
        transition: 0.3s;
        text-decoration: none;
        display: inline-block;
    }

    .btn-small:hover {
        background: #2c5a6d;
        transform: scale(1.05);
    }

    /* Alert Special Style */
    .alert-card {
        border: 1px solid rgba(231, 76, 60, 0.3);
    }
    
    .alert-btn {
        background: #c0392b;
    }
    
    .alert-btn:hover {
        background: #e74c3c;
    }
</style>

<div class="dashboard-container">
    <div class="dashboard-wrapper">

        <div class="dashboard-heading">
            <h2>Guardian Dashboard</h2>
            <p>Monitor and support your elders efficiently</p>
        </div>

        <div class="dashboard">

            <div class="card">
                <h3>View My Elders</h3>
                <a href="{{ url_for('view_elders') }}" class="btn-small">Go</a>
            </div>

            <div class="card">
                <h3>Reminders</h3>
                <a href="{{ url_for('view_reminders') }}">
                    <button class="btn-small">Go</button>
                </a>
            </div>

            <div class="card">
                <h3>Emergency Alerts</h3>
                <a href="{{ url_for('guardian_latest_sos') }}">
                    <button class="btn-small">Go</button>
                </a>
               
            </div>

            <!-- NEW CARD -->
            <div class="card">
                <h3>Latest Health Records</h3>
                <a href="{{ url_for('guardian_health') }}">
                    <button class="btn-small">Go</button>
                </a>
            </div>

            <!-- NEW CARD -->
            <div class="card">
                <h3>Latest Mood Status</h3>
                <a href="{{ url_for('guardian_latest_moods') }}">
                    <button class="btn-small">Go</button>
                </a>
            </div>

        </div>

    </div>
</div>
<audio id="sosSound" src="{{ url_for('static', filename='alert.mp3') }}"></audio>

<script>
let lastSOS = null;
let audio = document.getElementById("sosSound");

function checkSOS() {
    fetch('/check_new_sos')
    .then(res => res.json())
    .then(data => {
        if (data.new && data.id !== lastSOS) {
            lastSOS = data.id;

            // 🔊 Play ONLY when SOS comes
            audio.currentTime = 0;
            audio.play();

            alert("🚨 SOS ALERT RECEIVED!");
        }
    });
}

// Check every 5 sec
setInterval(checkSOS, 5000);
</script>

{% endblock %}
